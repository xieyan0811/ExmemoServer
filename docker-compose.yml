# Usage:
#   Production:  docker-compose --profile production up -d
#   Development: docker-compose --profile development up

version: '3'
services:
  exmemoserver:
    image: exmemoserver:latest
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTP_PROXY:-}
    restart: always
    container_name: exmemoserver
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8100}:8100"
    depends_on:
      - minio
    profiles:
      - production

  exmemoserver_dev:
    image: exmemoserver:latest
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTP_PROXY:-}
    container_name: exmemoserver_dev
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8100}:8100"
    volumes:
      - .:/opt/exmemoserver
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8100", "--reload"]
    depends_on:
      - minio
    profiles:
      - development

  minio:
    image: minio/minio:latest
    container_name: minio_storage
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-root}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-password}"
    volumes:
      - ${HOST_DATA_DIR:-./minio_data}/minio:/data
    profiles:
      - production
      - development
