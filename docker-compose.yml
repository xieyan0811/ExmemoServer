# Usage:
#   Production:  docker-compose --profile production up -d
#   Development: docker-compose --profile development up

version: '3'
services:
  exmemoserver:
    image: exmemoserver:latest
    restart: always
    container_name: exmemoserver
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8100}:8100"
    profiles:
      - production

  exmemoserver_dev:
    image: exmemoserver:latest
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTP_PROXY:-}
    container_name: exmemoserver_dev
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8100}:8100"
    volumes:
      - .:/opt/exmemoserver
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8100", "--reload"]
    profiles:
      - development
